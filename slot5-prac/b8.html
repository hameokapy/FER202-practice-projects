<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>B8</title>
</head>
<body>
    <div class="container m-2 mx-auto">
        <div class="alert mx-auto bg-warning-subtle w-50 alert-dismissible fade show">
            Thông báo đặt vé
            <button class="btn btn-close"></button>
        </div>

        <h1 class="text-center">Form đặt vé máy bay</h1>

        <form class="w-50 mx-auto">
            <div class="mt-3">
                <label for="hoTen" class="form-label">Họ tên</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="hoTen" placeholder="Họ tên" class="form-control">
                    <span class="input-group-text">
                        vnđ
                    </span>
                </div>
                <div class="form-text">Phải nhập 5 ký tự, in hoa...</div>
            </div>

            <div class="mt-3">
                <label for="address" class="form-label">Địa chỉ</label>
                <div class="input-group">
                    <input type="text" name="address" class="form-control">
                </div>
                <div class="form-text">Phải nhập 5 ký tự, in hoa...</div>
            </div>

            <div class="mt-3 row">
                <div class="col-6">
                    <label for="from" class="form-label">Đi từ</label>
                    <select name="from" id="from" class="form-select">
                        <option value="Hà Nội">Hà Nội</option>
                    </select>
                </div>
                <div class="col-6">
                    <label for="to" class="form-label">Đến</label>
                    <select name="from" id="from" class="form-select">
                        <option value="Hà Nội">Hà Nội</option>
                    </select>
                </div>
            </div>

            <div class="mt-3">
                <label for="to" class="form-label">Chọn chiều đi (Khứ hồi)</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="di">
                    <label class="form-check-label" for="di">Đi</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="ve">
                    <label class="form-check-label" for="ve">Về</label>
                </div>
            </div>

            <button class="btn btn-primary w-100 mt-3">Đặt vé</button>
        </form>
    </div>
</body>
</html>
